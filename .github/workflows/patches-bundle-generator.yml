name: Patches Bundle Generator

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MORPHE_PAT }}

      - name: Fetch latest release from hoo-dles/morphe-patches
        id: upstream
        run: |
          RELEASE=$(curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/hoo-dles/morphe-patches/releases/latest)

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          DESCRIPTION=$(echo "$RELEASE" | jq -r '.body // ""')

          # Find the .mpp asset download URL
          DOWNLOAD_URL=$(echo "$RELEASE" | jq -r '
            .assets[]
            | select(.name | test("patches.*\\.mpp"))
            | .browser_download_url
          ' | head -n1)

          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "ERROR: Could not fetch upstream release tag."
            exit 1
          fi

          if [ -z "$DOWNLOAD_URL" ]; then
            echo "ERROR: No .mpp asset found in release $TAG."
            exit 1
          fi

          echo "tag=$TAG"             >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"

          # Multi-line description — use delimiter
          EOF=$(openssl rand -hex 8)
          echo "description<<$EOF"   >> "$GITHUB_OUTPUT"
          echo "$DESCRIPTION"        >> "$GITHUB_OUTPUT"
          echo "$EOF"                >> "$GITHUB_OUTPUT"

      - name: Read current version from patches-bundle.json
        id: current
        run: |
          CURRENT_VERSION=""
          if [ -f patches-bundle.json ]; then
            CURRENT_VERSION=$(jq -r '.version // ""' patches-bundle.json)
          fi
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        run: |
          UPSTREAM="${{ steps.upstream.outputs.tag }}"
          CURRENT="${{ steps.current.outputs.version }}"

          echo "Upstream : $UPSTREAM"
          echo "Current  : $CURRENT"

          if [ "$UPSTREAM" = "$CURRENT" ]; then
            echo "No update needed."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New release detected — will update."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update patches-bundle.json
        if: steps.compare.outputs.changed == 'true'
        run: |
          jq -n \
            --arg version      "${{ steps.upstream.outputs.tag }}" \
            --arg description  "${{ steps.upstream.outputs.description }}" \
            --arg download_url "${{ steps.upstream.outputs.download_url }}" \
            '{
              version: $version,
              description: $description,
              download_url: $download_url
            }' > patches-bundle.json

          echo "patches-bundle.json updated:"
          cat patches-bundle.json

      - name: Commit and push
        if: steps.compare.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add patches-bundle.json
          git commit -m "chore: update patches-bundle to ${{ steps.upstream.outputs.tag }}"
          git push
